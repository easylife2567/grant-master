round_goal_excerpt:
  goal: "系统调研 RDMA 多租户性能隔离和分布式训练通信调度的现有方法"
  what_to_find: "分布式训练中针对通信效率的调度和网络优化系统工作，包括拓扑感知调度、通信压缩协同、NCCL优化、参数服务器调度等"
  what_not_to_find: "纯训练算法优化不涉及网络调度、将通信优化仅作为训练加速技巧而不涉及系统设计的论文"
  core_question: "分布式训练的通信调度主要关注哪些维度（拓扑感知、压缩协同、优先级调度）？有哪些代表性系统工作？"

