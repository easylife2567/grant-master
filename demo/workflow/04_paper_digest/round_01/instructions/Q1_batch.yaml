round_goal_excerpt:
  goal: "系统调研 RDMA 多租户性能隔离和分布式训练通信调度的现有方法，回答已有方案覆盖了什么、在哪里还有不足"
  core_question: "已有 RDMA 多租户性能隔离方案主要有哪些技术路线？各自在隔离粒度、性能开销、实现复杂度上如何对比？这些方案是否考虑了分布式训练场景的通信模式特征？"
  what_not_to_find: "RDMA 基础协议细节、纯训练算法优化不涉及网络调度、通用数据中心网络调度非RDMA场景"

hypothesis_to_verify:
  - "多租户RDMA网络共享场景下，不同训练任务的通信性能确实存在不可忽视的相互干扰"
  - "现有的RDMA性能隔离方案（如PeRF、Harmonic）未充分考虑训练场景的通信模式特征"
  - "感知训练任务通信特征的调度策略相比纯网络层调度可取得更好的隔离效果"

