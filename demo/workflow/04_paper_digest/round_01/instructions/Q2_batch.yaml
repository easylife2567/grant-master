round_goal_excerpt:
  goal: "系统调研 RDMA 多租户性能隔离和分布式训练通信调度的现有方法"
  core_question: "分布式训练的通信调度主要关注哪些维度？现有训练通信调度是否考虑多任务并发的隔离和公平性？"
  what_not_to_find: "纯训练算法优化不涉及网络调度、将通信优化仅作为训练加速技巧不涉及系统设计"

hypothesis_to_verify:
  - "分布式训练的通信调度已有成熟的技术路线（优先级调度、压缩协同、拓扑感知），但多任务隔离尚未被充分考虑"
  - "将训练语义纳入网络层调度决策可获得比纯网络层调度更好的效果"

