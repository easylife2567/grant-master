  goal: "系统调研 RDMA 多租户性能隔离和分布式训练通信调度的现有方法"
  core_question: "NCCL等通信库在多任务/多租户场景下是否有资源管理和隔离机制？多任务并发训练的通信干扰如何被研究和量化？"
  what_not_to_find: "单任务NCCL性能优化、仅讨论计算资源争抢不涉及网络"

hypothesis_to_verify:
  - "NCCL自身不区分不同训练任务，多租户GPU集群中的通信资源管理完全依赖上层调度系统"
  - "多任务训练的网络干扰是真实可量化的，已有实证研究佐证"

