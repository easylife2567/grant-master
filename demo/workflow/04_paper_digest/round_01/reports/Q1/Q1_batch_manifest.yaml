cross_paper_findings:
  common_themes:
    - "微架构资源感知是RDMA多租户隔离的核心挑战——仅靠带宽隔离已完全不够"
    - "三层隔离体系形成中：通信域隔离 → 性能资源隔离 → 工作负载感知调度（后者所有论文均缺失）"
    - "工作保持(work-conserving)是软件隔离方案的关键需求——静态预留导致严重吞吐损失"
    - "硬件辅助(FPGA/ASIC) vs 纯软件的路线分歧——精确性 vs 部署灵活性的权衡"
  contradictions:
    - "双向RDMA vs 单向RDMA 原语选择：Palladium论证双向更适合零拷贝，PeRF/Harmonic主要基于单向控制"
  coverage_gaps:
    - "所有6篇论文均未感知分布式训练通信模式（迭代burst/空闲交替）"
    - "所有方案作用域限于单个RNIC/sNIC，缺乏跨节点全局通信调度"
    - "GPU Direct RDMA场景下的性能隔离未覆盖"
    - "大量并发训练任务(>3)的竞争效应未评估"
    - "不同集合通信操作(AllReduce/AllGather/ReduceScatter)对RNIC资源的不同敏感性未系统研究"
    - "动态自适应隔离策略（根据工作负载特征调整隔离参数）缺失"

