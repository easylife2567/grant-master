cross_paper_findings:
  common_themes:
    - "从end-host到network的调度深度递增：flow-level (TicTac) → slice-level (P3) → packet-level (DLCP) → operator-level (DHelix)"
    - "DNN训练语义嵌入通信调度是共同范式：7篇论文均利用layer依赖/消费时序/梯度重要性/bounded loss/operator兼容性等训练特性"
    - "组合优化形式化为通用方法：heuristic search (TicTac/MergeComp), DP (DynaComm/DHelix), CO/Greedy (CrossPipe)"
  contradictions:
    - "静态vs动态调度：TicTac离线一次计算 vs DynaComm运行时每epoch重算 vs CrossPipe hot-switching"
    - "压缩路线 vs Loss-tolerance路线：MergeComp优化压缩以减少数据量 vs DLCP容忍丢包以改变可靠性语义"
    - "PP优先 vs 全面的通信策略：CrossPipe论证PP是跨DC最佳策略 vs DHelix表明TP/SP/CP/EP intra-layer通信才是主要瓶颈"
  coverage_gaps:
    - "多作业/多租户通信隔离与公平性：全部7篇论文无一提及"
    - "RDMA网络下的通信调度适配：现有方案均基于gRPC/TCP/NCCL，未探索one-sided RDMA操作的调度空间"
    - "异构硬件/异构网络下的调度：CrossPipe略微提及但无实验验证"
    - "训练不同阶段的调度策略自适应性：训练过程中梯度大小变化但调度策略不变"
