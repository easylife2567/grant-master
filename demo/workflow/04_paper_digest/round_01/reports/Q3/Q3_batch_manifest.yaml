  contradictions:
    - "紧凑度是好代理吗？BandPilot明确否定紧凑度(4+4优于6+2)，vClos隐含支持紧凑度(Stage 0/1优先同服务器/同Leaf)，Arnold部分支持(简单拓扑下紧凑度有效)"
    - "空间隔离(vClos独占子拓扑) vs 智能共享(BandPilot学习模型规避争用)：两路线代价不同"
    - "NCCL是否可替代：VCCL主张替代(已24K GPU部署)，其他四篇以NCCL为不可修改底层"
  coverage_gaps:
