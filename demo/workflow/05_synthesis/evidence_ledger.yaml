    description: "在分布式训练多租户场景下，现有RDMA隔离方案（PeRF/Harmonic/Husky等6篇）将流量视为稳态流，不感知训练任务的迭代burst/空闲交替、集合通信操作类型差异(AllReduce/AlltoAll)、ML对部分数据丢失的容忍度"
    confidence: "high"
    scene_match: "strong"
    solvability: "high"
    verifiability: "high"
