    description: "分布式训练通信调度领域（TicTac/P3/DLCP/DHelix等7篇）全部聚焦单作业优化，优先级调度策略在多作业独立执行时可能造成饥饿和不公平"
    confidence: "high"
    scene_match: "strong"
    solvability: "high"
    verifiability: "high"
    sources:
      - "Q2_batch_report (cross-7-papers, 多租户列为空白)"
    helm_relevance: "primary"

  - id: "GAP-003"
    title: "RDMA CC/LB缺乏训练专有优化"
    description: "通用RDMA CC(DCQCN/HPCC)对训练性能影响<4%但设计复杂度过高；ECMP哈希冲突导致多任务训练严重性能退化需要训练专有极简替代方案"
    confidence: "high"
    scene_match: "strong"
    solvability: "medium"
    verifiability: "medium"
    sources:
      - "Khan et al. digest (CC impact <4%)"
