  tables_auto_generatable: 0
  citations_count: 0
  citations_complete_metadata: 0
  citations_partial_metadata: 0

quality:
  outline_depth_score: 0.0
  volume_planning_score: 0.0
  unit_decomposition_score: 0.0
  source_allocation_score: 0.0
  helm_alignment_score: 0.0
  writability_score: 0.0

intervention:
  required: false
  reason: ""
  questions: []

integrity:
  all_outputs_present: true
  checked_at: ""
  missing_outputs: []
  warnings: []

notes:
  - "本阶段完成申请书内容架构与体量规划，下一阶段应进入 08-section-write。"

